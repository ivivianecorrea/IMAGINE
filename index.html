    <section id="recentes">
        <h2 class="recentes">Recentes</h2>
        <div class="cardsR" id="todoscardsR"></div>
    </section>

    <div class="linha-categorias-filtros">
        <div class="categoriascontainer">
            <button class="categoria-item ativo" data-categoria="todos">Todos</button>
            <button class="categoria-item" data-categoria="lendo">Lendo</button>
            <button class="categoria-item" data-categoria="relendo">Relendo</button>
            <button class="categoria-item" data-categoria="quero-ler">Quero Ler</button>
            <button class="categoria-item" data-categoria="finalizados">Finalizados</button>
            <button class="categoria-item" data-categoria="abandonados">Abandonados</button>
            <button class="categoria-item" data-categoria="favoritos">Favoritos</button>
        </div>
        
        <div class="acoes-direita-container" style="position: relative;">
            <button class="btn-acao-topo btn-filtro-secao" id="btn-filtro" title="Filtrar biblioteca">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" d="..."><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
            </button>
            <button class="btn-acao-topo btn-lixeira-secao" title="Lixeira" id="btn-lixeira-secao"> 
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" d="..."><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>

            <div class="balao-filtro" id="balao-filtro">
                <div class="opcao-filtro ativa" data-ordem="padrao">Padrão</div>
                <div class="opcao-filtro" data-ordem="az">Ordem: A - Z</div>
                <div class="opcao-filtro" data-ordem="za">Ordem: Z - A</div>
            </div>
        </div>
    </div>

    <div class="cardsC" id="todoscardsC"></div>

    <div class="container-acoes-lixeira" id="container-acoes-lixeira" style="display: none;">
        <button class="btn-selecionar-tudo" id="btn-selecionar-tudo">Selecionar Tudo</button>
        <button class="btn-deletar-secao" id="btn-deletar-selecionados">Deletar Selecionados</button>
    </div>

    <div class="modal-overlay" id="modal-edicao-livro" style="display: none;">
        <div class="modal-conteudo">
            <button class="btn-fechar-modal" id="btn-fechar-modal-livro">✕</button>
            <div class="modal-esquerda">
                <img class="modal-capa" id="modal-capa-livro" src="img/capapadrao.jpg" alt="Capa do Livro">
            </div>
            <div class="modal-direita">
                <div class="modal-campo">
                    <label>Título do Livro</label>
                    <input type="text" id="modal-input-titulo" placeholder="Digite o título...">
                </div>
                <div class="modal-campo">
                    <label>Autor</label>
                    <input type="text" id="modal-input-autor" placeholder="Digite o autor...">
                </div>
                <button class="btn-salvar-modal" id="btn-salvar-modal-livro">Salvar</button>
            </div>
        </div>
    </div>

    <nav class="aba-inferior">
        <a href="index.html" class="aba-item ativo"><span>Início</span></a>

    <template id="template-card-recente">
        <div class="card card-recente">
            <div class="card-recente-conteudo">
                <img class="card-recente-capa" src="" alt="Capa">
                <div class="card-recente-info">
                    <h3 class="card-recente-titulo"></h3>
                    <p class="card-recente-autor"></p>
                </div>
            </div>
        </div>
    </template>

    <template id="template-card-principal">
        <div class="card card-livro-individual">
            <div class="capa-container">
                <img class="capa-livro" src="" alt="Capa do Livro" loading="lazy">
                <div class="etiqueta-formato"></div>  
                <div class="menu-categorias-capa">
                    <button class="btn-cat cat-lendo" title="Lendo" data-cat="lendo">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                    </button>
                    <button class="btn-cat cat-relendo" title="Relendo" data-cat="relendo">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                    </button>
                    <button class="btn-cat cat-quero-ler" title="Quero Ler" data-cat="quero-ler">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
                    </button>
                    <button class="btn-cat cat-finalizados" title="Finalizados" data-cat="finalizados">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </button>
                    <button class="btn-cat cat-abandonados" title="Abandonados" data-cat="abandonados">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                    <button class="btn-cat cat-favoritos" title="Favoritos" data-cat="favoritos">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                    </button>
                </div>
            </div>
            <div class="card-info">
                <h3 class="titulo"></h3>
                <p class="card-principal-autor"></p>
            </div>
        </div>
